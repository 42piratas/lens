name: Question
description: Ask about LENS — setup, behavior, or how to extend
title: "[Q] "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Before opening a question, please check:
        - [`README.md`](https://github.com/42piratas/lens/blob/main/README.md)
        - [`docs/development.md`](https://github.com/42piratas/lens/blob/main/docs/development.md)
        - [`docs/architecture.md`](https://github.com/42piratas/lens/blob/main/docs/architecture.md)
        - [`CONTRIBUTING.md`](https://github.com/42piratas/lens/blob/main/CONTRIBUTING.md)
        - The connector's `README.md` (`app/connectors/<id>/README.md`) for connector-specific setup
        - Existing issues — your question may already be answered.
  - type: textarea
    id: question
    attributes:
      label: What's your question?
      description: Be specific. "How do I X?" beats "Help with X."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What have you already tried or read?
      description: Links to docs you've checked, commands you've run, error messages you've seen.
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: OS, deployment target, related issues.
    validations:
      required: false
