name: Feature request
description: Propose a new feature or enhancement
title: "[FEAT] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for thinking about how to make LENS better. Please describe the problem first — the solution may have several shapes.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing problem or unmet need. Concrete is better than abstract.
      placeholder: I keep two Trello boards open in browser tabs because LENS only shows one at a time per tile.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Your idea for how LENS should solve it. UI sketches welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you didn't pick them.
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Which surface does this touch?
      description: LENS is structured around five modular surfaces — see `docs/architecture.md`. Pick the closest fit.
      options:
        - Connector (new data source or change to an existing one)
        - Tile (new way to render data)
        - Theme (new palette)
        - Workspace (saved layout/theme snapshots)
        - Plugin (cross-tile drag-payload behavior)
        - Shell / chrome (sidebar, settings page, routing, auth)
        - Cross-cutting / not sure
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Links to related issues, prior art in other tools, willingness to contribute the change yourself.
    validations:
      required: false
